# FerrinAntiGrief Configuration

webhook:
  enabled: false
  url: "YOUR_WEBHOOK_API"

protection:
  nbt:
    max-serialized-bytes: 15000
    max-book-pages: 50
    max-page-length: 400
    max-depth: 5
  execute:
    max-depth: 3

double-confirm:
  timeout-seconds: 15

audit:
  log-to-console: true
  file-name: "admin-audit.log"

# List of commands to obfuscate
# Grouped for organizational clarity
obfuscated-commands:
  - "fill"
  - "setblock"
  - "clone"
  - "summon"
  - "spreadplayers"
  - "place"
  - "particle"
  - "playsound"
  - "kill"
  - "damage"
  - "effect"
  - "tp"
  - "ride"
  - "attribute"
  - "gamemode"
  - "clear"
  - "item"
  - "data"
  - "execute"
  - "schedule"
  - "function"
  - "loot"
  - "op"
  - "deop"
  - "whitelist"
  - "ban"
  - "ban-ip"
  - "pardon"
  - "stop"
  - "reload"
  - "difficulty"
  - "gamerule"
  - "give"

# Commands requiring double confirmation (original name)
confirm-required:
  - "op"
  - "deop"
  - "stop"
  - "reload"
  - "whitelist"
  - "gamerule"

risk-system:
  enabled: true
  alert-threshold: 50
  restrict-threshold: 70
  auto-ban-threshold: 90
  ban-duration-minutes: 60

entity-lag-detector:
  enabled: true
  max-entities-per-chunk: 200
  auto-clean: true
  scan-interval-seconds: 60

command-spam:
  enabled: true
  max-per-5s: 10
  rate-limit-per-second: 5

redstone-protection:
  enabled: true
  max-toggles-per-second: 40

dupe-detector:
  enabled: true
  item-spike-threshold: 150

honeytrap:
  enabled: true
  commands:
    - "minecraft:op"
    - "bukkit:plugins"
    - "ver"
    - "about"

lockdown:
  enabled: false
  freeze-players: true
  block-dangerous-commands: true

alias-mutation:
  enabled: true
  rotate-hours: 12
  rotate-on-attack: true